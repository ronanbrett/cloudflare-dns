name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose --release
    - name: Cache
      uses: actions/cache@v5.0.4
      with:
        path: |
          target/release/build
          target/release/deps
        key: ${{ runner.os }}-${{ hashFiles('target/release/.fingerprint/**/*') }}
    - name: Run tests
      run: cargo test --verbose
    - uses: actions/upload-artifact@v4
      with:
        name: cloudflaredns
        path: target/release/cloudflaredns
